name: Daily Data Update

on:
  workflow_dispatch: # מאפשר הרצה ידנית דרך ממשק ה-Actions ב-GitHub
  schedule:
    - cron: '0 6 * * *' # הרצה יומית בבוקר
    - cron: '0 18 * * *' # הרצה נוספת בערב כדי לוודא עדכניות אחרי משחקים
    - cron: '0 0 */2 * *' # הרצה פעם ביומיים בחצות (מה שהיה ב-update_schedule)

jobs:
  update-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 google-generativeai pandas openpyxl lxml python-dotenv

      - name: Run update script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "Automated update of games schedule and insights" || echo "No changes to commit"
          git pull --rebase origin main
          git push
