<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Form - Maccabi Rehovot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Vehicle Form</h1>
    <form action="/vehicle/save" method="post">
        <label for="license_plate">License Plate:</label>
        <input type="text" name="license_plate" value="{{ vehicle.license_plate if vehicle else '' }}" {{ 'readonly' if vehicle else '' }}><br>

        <label for="employee_id">Employee ID:</label>
        <input type="text" name="employee_id" value="{{ vehicle.employee_id if vehicle else '' }}"><br>

        <label for="employee_name">Employee Name:</label>
        <input type="text" name="employee_name" value="{{ vehicle.employee_name if vehicle else '' }}"><br>

        <label for="cost_center">Cost Center:</label>
        <input type="text" name="cost_center" value="{{ vehicle.cost_center if vehicle else '' }}"><br>

        <label for="manufacturer">Manufacturer:</label>
        <input type="text" name="manufacturer" value="{{ vehicle.manufacturer if vehicle else '' }}"><br>

        <label for="model">Model:</label>
        <input type="text" name="model" value="{{ vehicle.model if vehicle else '' }}"><br>

        <label for="engine_type">Engine Type:</label>
        <input type="text" name="engine_type" value="{{ vehicle.engine_type if vehicle else '' }}"><br>

        <label for="leasing_company">Leasing Company:</label>
        <input type="text" name="leasing_company" value="{{ vehicle.leasing_company if vehicle else '' }}"><br>

        <label for="contract_start_date">Contract Start Date:</label>
        <input type="date" name="contract_start_date" value="{{ vehicle.contract_start_date.strftime('%Y-%m-%d') if vehicle and vehicle.contract_start_date else '' }}"><br>

        <label for="contract_end_date">Contract End Date:</label>
        <input type="date" name="contract_end_date" value="{{ vehicle.contract_end_date.strftime('%Y-%m-%d') if vehicle and vehicle.contract_end_date else '' }}"><br>

        <button type="submit">Save</button>
    </form>
</body>
</html>
