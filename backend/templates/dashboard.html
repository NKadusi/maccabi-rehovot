<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Maccabi Rehovot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Dashboard</h1>
    
    <div>
        <h2>KPIs</h2>
        <p>Total Active Vehicles: {{ total_vehicles }}</p>
        <p>Electric Vehicles: {{ ev_percentage | round(2) }}%</p>
    </div>

    <div>
        <h2>Cost Trend (Last 12 Months)</h2>
        <canvas id="costTrendChart"></canvas>
    </div>

    <div>
        <h2>Manufacturer Distribution</h2>
        <canvas id="manufacturerChart"></canvas>
    </div>

    <script>
        // Cost Trend Chart
        fetch('/dashboard/cost-trend')
            .then(response => response.json())
            .then(data => {
                new Chart(document.getElementById('costTrendChart'), {
                    type: 'line',
                    data: {
                        labels: data.labels,
                        datasets: data.datasets
                    }
                });
            });

        // Manufacturer Distribution Chart
        fetch('/dashboard/manufacturer-distribution')
            .then(response => response.json())
            .then(data => {
                new Chart(document.getElementById('manufacturerChart'), {
                    type: 'pie',
                    data: {
                        labels: data.labels,
                        datasets: [{
                            data: data.values,
                            backgroundColor: [
                                'rgba(255, 99, 132, 0.2)',
                                'rgba(54, 162, 235, 0.2)',
                                'rgba(255, 206, 86, 0.2)',
                                'rgba(75, 192, 192, 0.2)',
                                'rgba(153, 102, 255, 0.2)',
                                'rgba(255, 159, 64, 0.2)'
                            ],
                            borderColor: [
                                'rgba(255, 99, 132, 1)',
                                'rgba(54, 162, 235, 1)',
                                'rgba(255, 206, 86, 1)',
                                'rgba(75, 192, 192, 1)',
                                'rgba(153, 102, 255, 1)',
                                'rgba(255, 159, 64, 1)'
                            ],
                            borderWidth: 1
                        }]
                    }
                });
            });
    </script>
</body>
</html>
